<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачи</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <!-- CSP только для разработки -->
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'">
</head>
<body>
  <div class="layout">
    <header>
      <div class="logo">Задачи <span>офлайн</span></div>
      <div id="status-badge">
        <div class="dot"></div>
        <span id="status-text">Проверка…</span>
      </div>
    </header>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Всего</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-active">0</div>
        <div class="stat-label">Активных</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-label">Выполнено</div>
      </div>
    </div>

    <form class="add-form">
      <input type="text" id="task-input" placeholder="Добавить задачу...">
      <button type="button" id="add-btn">Добавить</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="active">Активные</button>
      <button class="filter-btn" data-filter="done">Выполнено</button>
    </div>

    <ul id="task-list"></ul>

    <div class="actions-bar">
      <span id="left-count">Активных: 0</span>
      <button class="clear-btn" id="clear-done">Очистить выполненные</button>
    </div>
  </div>

  <div id="sw-toast"></div>
  <script src="app.js"></script>
</body>
</html>
