version: "3.8"
services:
  backend1:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: node server.js
    environment:
      - PORT=3000
    networks: [appnet]

  backend2:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: node server.js
    environment:
      - PORT=3001
    networks: [appnet]

  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [backend1, backend2]
    networks: [appnet]

  haproxy:
    image: haproxy:alpine
    ports: ["81:80"]
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on: [backend1, backend2]
    networks: [appnet]

networks:
  appnet: