<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Задачи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <header>
      <div class="logo">
        Задачи
        <span>офлайн</span>
      </div>
      <div id="status-badge">
        <div class="dot"></div>
        <span id="status-text">Проверка…</span>
      </div>
    </header>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Всего</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-active">0</div>
        <div class="stat-label">Активных</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-label">Выполнено</div>
      </div>
    </div>

    <div class="add-form">
      <input id="task-input" type="text" placeholder="Добавить задачу…" autocomplete="off" />
      <button id="add-btn">Добавить</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="active">Активные</button>
      <button class="filter-btn" data-filter="done">Выполнено</button>
    </div>

    <ul id="task-list"></ul>

    <div class="actions-bar">
      <span id="left-count"></span>
      <button class="clear-btn" id="clear-done">Очистить выполненные</button>
    </div>
  </div>

  <div id="sw-toast">✓ Офлайн-режим активен</div>

  <script src="app.js"></script>
</body>
</html>
